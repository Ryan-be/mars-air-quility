name: Test

# Mirror of .github/workflows/test.yml. See lint.yml header for the
# why-we-need-a-copy explanation.

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
        poetry run pip install -e ./contracts
        poetry run pip install -e ./grow_unit
    - name: Run unit tests (excludes e2e)
      # The backup E2E suite has its own job below; excluding it here
      # keeps the unit-test matrix fast and lets a Docker hiccup fail
      # E2E without blocking the unit-test signal.
      run: |
        poetry run pytest tests/ -v -m "not e2e"

  backup-e2e:
    # End-to-end backup pipeline tests against real Postgres + MinIO
    # containers via testcontainers-python. Requires Docker on the runner.
    # On the Gitea runner this is the rootful Docker daemon installed
    # in Phase 0 Task 2 — see docs/CI.md.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
        poetry run pip install -e ./contracts
        poetry run pip install -e ./grow_unit
    - name: Run backup E2E tests
      run: |
        poetry run pytest tests/backup_e2e/ -v -m e2e
