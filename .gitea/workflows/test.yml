name: Test

# Mirror of .github/workflows/test.yml. See lint.yml header for the
# why-we-need-a-copy explanation.

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install --with dev
        poetry run pip install -e ./contracts
        poetry run pip install -e ./grow_unit
    - name: Run unit tests (excludes e2e)
      # backup-e2e is deferred to Phase 3 of the pipeline plan — needs
      # Docker-in-Docker validation on the runner (Phase 3 Task 8 in
      # docs/superpowers/plans/2026-05-31-gitea-actions-pipeline.md).
      # The GitHub Actions copy still runs the full e2e suite; we'll
      # add the Gitea backup-e2e job back once DinD is verified.
      run: |
        poetry run pytest tests/ -v -m "not e2e"
