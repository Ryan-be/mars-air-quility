name: Trivy

# Filesystem + dependency-lockfile CVE scan.
# Fails the build on HIGH or CRITICAL findings; prints findings as
# a table to the workflow log so they're visible without needing
# to download the SARIF artifact (artifact upload currently fails
# because Gitea's [server] ROOT_URL points at the stale .64 IP —
# operator fix needed in app.ini, tracked separately).
#
# Allowlist exceptions live in .trivyignore at repo root.

on:
  push:
  workflow_dispatch:
  schedule:
    # Nightly at 03:00 UTC — catches new CVEs disclosed against
    # deps we haven't touched in a while.
    - cron: '0 3 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg apt-transport-https
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Trivy filesystem scan — printed findings (informational)
        # Always runs, always prints, never fails the build. This is
        # so the workflow log shows WHICH CVEs are blocking even
        # when the gate step (next) exits non-zero.
        if: always()
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --skip-dirs '.git,node_modules,dist,.claude'

      - name: Trivy filesystem scan — HIGH + CRITICAL gate
        # Same scan, exit 1 if findings → fails the build. The
        # printed step above already shows what was found.
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --format json \
            --output trivy-fs.json \
            --skip-dirs '.git,node_modules,dist,.claude'

      - name: Upload findings as workflow artifact (best-effort)
        # Gitea's stale ROOT_URL .64 makes act_runner artifact upload
        # fail with EHOSTUNREACH; continue-on-error so this doesn't
        # mask the actual CVE-gate result. Operator: fix app.ini
        # ROOT_URL to http://192.168.0.196:3000/ to enable artifacts.
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: trivy-fs-findings
          path: trivy-fs.json
          retention-days: 30
