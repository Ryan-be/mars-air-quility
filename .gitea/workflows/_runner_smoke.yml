# Phase-0 canary. Delete after Phase 1 ports the real workflows.
# Purpose: verify the runner is online, can pick up a job, can stream
# logs back. Manually dispatched only — does not run on push.
name: _runner_smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Hello from the runner
        run: |
          echo "Runner labels: $RUNNER_LABELS"
          echo "Runner name:   $RUNNER_NAME"
          echo "OS:            $(uname -a)"
          echo "Docker socket: $(ls -la /var/run/docker.sock 2>&1 || echo unavailable)"
