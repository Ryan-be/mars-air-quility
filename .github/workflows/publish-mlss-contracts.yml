# Publish mlss-contracts to PyPI on a `mlss-contracts-vX.Y.Z` tag push.
#
# mlss-grow's PyPI build depends on this package being available, so cut
# this release first when bumping both packages together. The contracts
# package has no path-deps of its own, so it doesn't need the prepare/
# restore dance — straight `poetry build` then `twine upload`.
#
# See docs/RELEASE_PROCESS.md.

name: Publish mlss-contracts

on:
  push:
    tags:
      - "mlss-contracts-v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry + twine
        run: |
          python -m pip install --upgrade pip
          pip install poetry==1.8.* twine==5.*

      - name: Build wheel + sdist
        working-directory: contracts
        run: poetry build

      - name: twine check
        run: twine check contracts/dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload contracts/dist/*

      - name: Upload wheel to GitHub release
        if: startsWith(github.ref, 'refs/tags/mlss-contracts-v')
        uses: softprops/action-gh-release@v2
        with:
          files: contracts/dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
