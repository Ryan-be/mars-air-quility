<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLSS</title>
  <script src="https://cdn.plot.ly/plotly-2.24.2.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 1em;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1em;
    }
    .top-bar select,
    .top-bar button,
    .top-bar label {
      margin: 0.25em;
    }
    .sensor-table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }
    .sensor-table td {
      padding: 0.5em 1em;
      border-bottom: 1px solid #444;
    }
    .sensor-table td:first-child {
      font-weight: bold;
      white-space: nowrap;
    }
    .plot-container {
      display: flex;
      flex-direction: column;
      gap: 1em;
      width: 100%;
    }
    .plot-container > div {
      width: 100%;
      min-height: 300px;
    }
    .dark-mode {
      background-color: #121212;
      color: #fff;
    }
    .light-mode {
      background-color: #fff;
      color: #000;
    }
    .ok { color: lightgreen; }
    .error { color: orange; }
    #health ul {
      list-style-type: none;
      padding: 0;
    }
    #health li {
      margin: 0.25em 0;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <p id="last-updated" style="margin: 0.5em 0; font-style: italic;">Last updated: never</p>
    <h2>MLSS</h2>
    <div>
      <label for="range">Time Range:</label>
      <select id="range">
        <option value="1h">Last Hour</option>
        <option value="6h">Last 6 Hours</option>
        <option value="12h">Last 12 Hours</option>
        <option value="24h">Last 24 Hours</option>
        <option value="all">All Time</option>
      </select>
      <button onclick="downloadCSV()">Download CSV</button>
      <label><input type="checkbox" id="darkToggle" checked> Dark Mode</label>
    </div>
  </div>

  <table class="sensor-table" id="summary-table">
    <tr><td>🌡️ <strong>Temperature (°C):</strong></td><td id="tempValue">--</td></tr>
    <tr><td>💧 <strong>Humidity (%):</strong></td><td id="humValue">--</td></tr>
    <tr><td>🫁 <strong>eCO₂ (ppm):</strong></td><td id="eco2Value">--</td></tr>
    <tr><td>🧪 <strong>TVOC (ppb):</strong></td><td id="tvocValue">--</td></tr>
  </table>

  <div class="plot-container">
    <div id="tempPlot"></div>
    <div id="humPlot"></div>
    <div id="eco2Plot"></div>
    <div id="tvocPlot"></div>
  </div>

  <div id="health">
    <h3>🔧 System Health</h3>
    <table class="sensor-table" id="health-table">
      <tr><td><strong>AHT20:</strong></td><td id="aht20Status">Checking...</td></tr>
      <tr><td><strong>SGP30:</strong></td><td id="sgp30Status">Checking...</td></tr>
      <tr><td><strong>CPU Usage:</strong></td><td id="cpuUsage">--</td></tr>
      <tr><td><strong>Memory:</strong></td><td id="memoryUsage">--</td></tr>
      <tr><td><strong>Uptime:</strong></td><td id="uptime">--</td></tr>
    </table>
  </div>

  <script>
    const darkToggle = document.getElementById("darkToggle");
    darkToggle.addEventListener("change", () => {
      document.body.className = darkToggle.checked ? "dark-mode" : "light-mode";
    });

    document.getElementById("range").addEventListener("change", fetchData);

    function attachAnnotationHandler(plotId) {
      const plot = document.getElementById(plotId);

      plot.on('plotly_click', function(data) {
        const dbId = data.points[0].customdata;
        const timestamp = data.points[0].x;
        const currentAnnotation = data.points[0].text || "";

        const container = document.createElement("div");
        container.innerHTML = `
          <div style="font-family: sans-serif;">
            <p><strong>Edit annotation for:</strong><br>${timestamp}</p>
            <p>Current annotation:</p>
            <textarea id="annotationInput" rows="4" style="width: 100%;">${currentAnnotation}</textarea>
            <div style="margin-top: 1em; text-align: right;">
              <button id="editBtn">Save</button>
              <button id="deleteBtn">Delete</button>
              <button id="cancelBtn">Cancel</button>
            </div>
          </div>
        `;

        const dialog = document.createElement("dialog");
        dialog.style.padding = "1em";
        dialog.style.maxWidth = "400px";
        dialog.appendChild(container);
        document.body.appendChild(dialog);
        dialog.showModal();

        dialog.querySelector("#editBtn").onclick = () => {
          const newAnnotation = document.getElementById("annotationInput").value;
          fetch(`/api/annotate?point=${dbId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ annotation: newAnnotation })
          }).then(res => {
            dialog.close();
            dialog.remove();
            alert(res.ok ? "✅ Annotation updated!" : "❌ Failed to update annotation.");
          });
        };

        dialog.querySelector("#deleteBtn").onclick = () => {
          fetch(`/api/annotate?point=${dbId}`, {
            method: "DELETE",
          }).then(res => {
            dialog.close();
            dialog.remove();
            alert(res.ok ? "🗑️ Annotation removed." : "❌ Failed to remove annotation.");
          });
        };

        dialog.querySelector("#cancelBtn").onclick = () => {
          dialog.close();
          dialog.remove();
        };
      });
    }

    async function fetchData() {
      const range = document.getElementById("range").value;
      const res = await fetch(`/api/data?range=${range}`);
      const data = await res.json();
      if (!Array.isArray(data)) return;

      const ids = data.map(d => d.id);
      const timestamps = data.map(d => new Date(d.timestamp));
      const temperatures = data.map(d => d.temperature);
      const humidities = data.map(d => d.humidity);
      const eco2 = data.map(d => d.eco2);
      const tvoc = data.map(d => d.tvoc);
      const annotations = data.map(d => d.annotation);

      const rollingTVOC = tvoc.map((_, i, arr) => {
        const slice = arr.slice(Math.max(i - 5, 0), i + 1);
        return slice.reduce((a, b) => a + b, 0) / slice.length;
      });

      const rateOfChange = tvoc.map((v, i, arr) => i > 0 ? v - arr[i - 1] : 0);

      const eventAnnotations = annotations.map((note, i) => {
        if (note && note.trim()) {
          return {
            x: timestamps[i],
            y: tvoc[i],
            text: note,
            showarrow: true,
            arrowhead: 2,
            ax: 0,
            ay: -40,
            bgcolor: "#444",
            font: { color: "#fff" }
          };
        }
        return null;
      }).filter(Boolean);

      Plotly.newPlot("tempPlot", [{
        x: timestamps, y: temperatures,
        mode: "lines+markers",
        name: "Temperature",
        line: { color: "deeppink" },
        customdata: ids
      }], {
        title: { text: "🌡️ Temperature (°C)" },
        xaxis: { title: "Time" },
        yaxis: { title: "°C" },
        autosize: true
      }, { responsive: true }).then(() => attachAnnotationHandler("tempPlot"));

      Plotly.newPlot("humPlot", [{
        x: timestamps, y: humidities,
        mode: "lines+markers",
        name: "Humidity",
        line: { color: "dodgerblue" },
        customdata: ids
      }], {
        title: { text: "💧 Humidity (%)" },
        xaxis: { title: "Time" },
        yaxis: { title: "%" },
        autosize: true
      }, { responsive: true }).then(() => attachAnnotationHandler("humPlot"));

      Plotly.newPlot("eco2Plot", [{
        x: timestamps, y: eco2,
        mode: "lines+markers",
        name: "eCO₂",
        line: { color: "yellowgreen" },
        customdata: ids
      }], {
        title: { text: "🫁 eCO₂ (ppm)" },
        xaxis: { title: "Time" },
        yaxis: { title: "ppm" },
        autosize: true
      }, { responsive: true }).then(() => attachAnnotationHandler("eco2Plot"));

      Plotly.newPlot("tvocPlot", [
        {
          x: timestamps,
          y: tvoc,
          mode: "lines+markers",
          name: "TVOC",
          marker: {
            color: tvoc,
            colorscale: "YlOrRd",
            cmin: Math.min(...tvoc),
            cmax: Math.max(...tvoc),
            colorbar: {
              title: "TVOC (ppb)",
              thickness: 15,
              len: 0.75,
              yanchor: "middle"
            }
          },
          line: { color: "rgba(0,0,0,0)" },
          customdata: ids,
          text: annotations,
          hoverinfo: "x+y+text"
        },
        {
          x: timestamps,
          y: rollingTVOC,
          mode: "lines",
          name: "Rolling Avg (TVOC)",
          line: { dash: "dash", color: "white", width: 2 }
        },
        {
          x: timestamps,
          y: rateOfChange,
          mode: "lines",
          name: "Rate of Change (TVOC)",
          yaxis: "y2",
          line: { color: "cyan", width: 2 }
        }
      ], {
        title: { text: "🧪 TVOC (ppb)" },
        xaxis: { title: "Time" },
        yaxis: { title: "TVOC (ppb)" },
        yaxis2: {
          title: "Rate of Change",
          overlaying: "y",
          side: "right",
          showgrid: false
        },
        legend: {
          x: 1.05,
          y: 1,
          bgcolor: "rgba(0,0,0,0)",
          font: { size: 12 }
        },
        annotations: eventAnnotations,
        autosize: true
      }, { responsive: true }).then(() => attachAnnotationHandler("tvocPlot"));



      document.getElementById("tvocValue").textContent = tvoc.at(-1) ?? "--";
      document.getElementById("tempValue").textContent = temperatures.at(-1)?.toFixed(2) ?? "--";
      document.getElementById("humValue").textContent = humidities.at(-1)?.toFixed(2) ?? "--";
      document.getElementById("eco2Value").textContent = eco2.at(-1) ?? "--";

      const now = new Date();
      document.getElementById("last-updated").textContent =
        "Last updated: " + now.toLocaleString();
    }

    async function fetchHealth() {
      try {
        const res = await fetch('/system_health');
        const stat = await res.json();

        document.getElementById("aht20Status").textContent = stat.AHT20;
        document.getElementById("aht20Status").className = stat.AHT20 === "OK" ? "ok" : "error";

        document.getElementById("sgp30Status").textContent = stat.SGP30;
        document.getElementById("sgp30Status").className = stat.SGP30 === "OK" ? "ok" : "error";

        document.getElementById("cpuUsage").textContent = stat.cpu_usage;
        document.getElementById("memoryUsage").textContent = `${stat.memory_used}/${stat.memory_total} (${stat.memory_percent})`;
        document.getElementById("uptime").textContent = stat.uptime;
      } catch (err) {
        const errorMessage = "Unable to fetch system health.";
        document.getElementById("aht20Status").textContent = errorMessage;
        document.getElementById("sgp30Status").textContent = errorMessage;
        document.getElementById("cpuUsage").textContent = "--";
        document.getElementById("memoryUsage").textContent = "--";
        document.getElementById("uptime").textContent = "--";
      }
    }

    function downloadCSV() {
      const range = document.getElementById("range").value;
      window.open(`/api/download?range=${range}`, "_blank");
    }

    fetchData();
    fetchHealth();
    setInterval(() => {
      fetchData();
      fetchHealth();
    }, 15000);
  </script>
</body>
</html>
