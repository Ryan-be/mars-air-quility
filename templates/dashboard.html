<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLSS Monitor Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --table-bg: #f9f9f9;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --table-bg: #1e1e1e;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        main {
            padding: 1rem;
        }

        table {
            width: 100%;
            margin-bottom: 1rem;
            background-color: var(--table-bg);
            border-collapse: collapse;
        }

        td {
            padding: 0.5rem;
            border-bottom: 1px solid #ddd;
            font-size: 1rem;
        }

        td:first-child {
            font-weight: bold;
            width: 50%;
        }

        .chart {
            margin-bottom: 2rem;
        }

        #dark-mode-label {
            color: white;
        }

        @media (max-width: 600px) {
            table td {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body data-theme="light">
    <header>
        <h1>🌍 MLSS Dashboard</h1>
        <div class="toolbar">
            <label id="dark-mode-label">Dark Mode <input type="checkbox" id="darkModeToggle"></label>
            <button onclick="downloadCSV()">📄 Download CSV</button>
        </div>
    </header>

    <main>
        <table>
            <tr><td>🌡️ Temperature</td><td id="temp">--</td></tr>
            <tr><td>💧 Humidity</td><td id="humidity">--</td></tr>
            <tr><td>🫁 eCO₂</td><td id="eco2">--</td></tr>
            <tr><td>🧪 TVOC</td><td id="tvoc">--</td></tr>
        </table>

        <table>
            <tr><td>🌡️ Temperature</td><td id="tempStatus">✅ OK</td></tr>
            <tr><td>🫁 eCO₂</td><td id="eco2Status">✅ OK</td></tr>
            <tr><td>🧪 TVOC</td><td id="tvocStatus">✅ Normal</td></tr>
        </table>

        <div class="chart" id="temperatureChart"></div>
        <div class="chart" id="humidityChart"></div>
        <div class="chart" id="eco2Chart"></div>
        <div class="chart" id="tvocChart"></div>
    </main>

    <script>
    const darkToggle = document.getElementById('darkModeToggle');
    darkToggle.addEventListener('change', () => {
        document.body.setAttribute('data-theme', darkToggle.checked ? 'dark' : 'light');
    });

    async function fetchData() {
        const response = await fetch('/api/data');
        return await response.json();
    }

    function downloadCSV() {
        window.location.href = "/download";
    }

    function updateStatus(value, thresholds, okText, warnText) {
        return value < thresholds[0] || value > thresholds[1] ? warnText : okText;
    }

    async function drawCharts() {
        const data = await fetchData();

        // Update stats
        document.getElementById("temp").innerText = `${data.temperature.at(-1).toFixed(2)} °C`;
        document.getElementById("humidity").innerText = `${data.humidity.at(-1).toFixed(2)} %`;
        document.getElementById("eco2").innerText = `${data.eco2.at(-1)} ppm`;
        document.getElementById("tvoc").innerText = `${data.tvoc.at(-1)} ppb`;

        // Update status
        document.getElementById("tempStatus").innerText = updateStatus(data.temperature.at(-1), [10, 35], "✅ OK", "⚠️ Warning");
        document.getElementById("eco2Status").innerText = updateStatus(data.eco2.at(-1), [0, 1000], "✅ OK", "⚠️ High");
        document.getElementById("tvocStatus").innerText = updateStatus(data.tvoc.at(-1), [0, 500], "✅ Normal", "⚠️ High");

        const layout = {
            margin: { t: 50 },
            responsive: true,
        };

        Plotly.newPlot('temperatureChart', [{
            x: data.timestamp, y: data.temperature,
            type: 'scatter', name: 'Temperature'
        }], {...layout, title: { text: 'Temperature (°C)', font: { size: 18 }}});

        Plotly.newPlot('humidityChart', [{
            x: data.timestamp, y: data.humidity,
            type: 'scatter', name: 'Humidity'
        }], {...layout, title: { text: 'Humidity (%)', font: { size: 18 }}});

        Plotly.newPlot('eco2Chart', [{
            x: data.timestamp, y: data.eco2,
            type: 'scatter', name: 'eCO₂'
        }], {...layout, title: { text: 'eCO₂ (ppm)', font: { size: 18 }}});

        Plotly.newPlot('tvocChart', [{
            x: data.timestamp, y: data.tvoc,
            type: 'scatter', name: 'TVOC'
        }], {...layout, title: { text: 'TVOC (ppb)', font: { size: 18 }}});
    }

    setInterval(drawCharts, 10000);
    drawCharts();
    </script>
</body>
</html>
