<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLSS – Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <style>
    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }
    .login-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-top: 3px solid deeppink;
      border-radius: 10px;
      padding: 2em 2.5em;
      width: 100%;
      max-width: 360px;
    }
    .login-card h2  { margin: 0 0 0.25em; font-size: 1.4em; }
    .login-card .sub { margin: 0 0 1.8em; color: #666; font-size: 0.85em; }

    .btn-github {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      width: 100%;
      padding: 0.65em;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      box-sizing: border-box;
    }
    .btn-github:hover  { background: #2ea043; }
    .btn-github svg    { flex-shrink: 0; }

    .error-msg { color: #ff6b6b; font-size: 0.88em; margin-top: 0.8em; text-align: center; }

    .no-oauth {
      color: #888;
      font-size: 0.85em;
      text-align: center;
      padding: 1em;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h2>🚀 MLSS</h2>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <h2>Sign in</h2>
      <p class="sub">Mars Life Support Sensor Monitor</p>

      {% if github_oauth_enabled %}
        <a href="/auth/github" class="btn-github">
          <svg width="20" height="20" viewBox="0 0 98 96" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756
              13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362
              0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015
              4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178
              1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378
              1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304
              13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213
              1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485
              13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404
              23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08
              11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364
              19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
          </svg>
          Sign in with GitHub
        </a>
      {% else %}
        <div class="no-oauth">
          GitHub OAuth is not configured.<br>
          Set <code>MLSS_GITHUB_CLIENT_ID</code> and<br>
          <code>MLSS_GITHUB_CLIENT_SECRET</code> in <code>.env</code>.
        </div>
      {% endif %}

      {% if error %}
        <p class="error-msg">{{ error }}</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
