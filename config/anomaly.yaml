# config/anomaly.yaml
# River HalfSpaceTrees anomaly detection configuration.
# One model per channel, trained on cold-tier write cycles (every 60s).

anomaly:
  algorithm: half_space_trees
  score_threshold: 0.7          # score > threshold → anomaly event
  cold_start_readings: 500      # suppress scores for first ~8h (500 × 60s); reduced from 1440
                                # because gas sensor channels (co_ppb, no2_ppb, nh3_ppb) are
                                # sparse in the DB (later migration) and model resets after
                                # param changes reset n_seen to 0. 500 readings is sufficient
                                # for HalfSpaceTrees (window_size=150) to stabilise.
  model_dir: data/anomaly_models  # relative to project root
  channels:
    - tvoc_ppb
    - eco2_ppm
    - temperature_c
    - humidity_pct
    - pm1_ug_m3
    - pm25_ug_m3
    - pm10_ug_m3
    - co_ppb       # sparse until MICS6814 has enough history
    - no2_ppb
    - nh3_ppb
    - pressure_hpa
